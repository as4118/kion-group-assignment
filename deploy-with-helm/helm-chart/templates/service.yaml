apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-todo-ui-svc
  labels:
    app: {{ .Release.Name }}-todo-ui
spec:
  type: ClusterIP

  selector:
    app: {{ .Release.Name }}-todo-ui

  ports:
    - name: http
      port: {{ .Values.ui.servicePort }}
      targetPort: {{ .Values.ui.port }}
      protocol: TCP